name: +Alpha Daily Macro Pipeline

on:
  schedule:
    # Runs at 14:00 UTC (7:30 PM IST) every day EXCEPT Monday
    - cron: '0 14 * * 0,2-6'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  run-daily-extraction:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Failsafe to prevent runaway free-tier billing

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Install Playwright Browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Execute Daily Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -m src.pipelines.run_daily